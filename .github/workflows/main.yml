name: Build RPM & Release

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:43

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Disable updates-testing repository
        run: |
          sed -i 's/^enabled=1/enabled=0/' /etc/yum.repos.d/fedora-updates-testing.repo

      - name: Install Dependencies
        run: |
          dnf install -y rpmdevtools kernel-devel git make gcc

      - name: Configure RPM Macros
        run: |
          cat > ~/.rpmmacros <<EOF
          %vendor GitHub (${{ github.repository }})
          %_topdir ${GITHUB_WORKSPACE}
          EOF

      - name: Copy sources to rpmbuild
        run: |
          mkdir -p SOURCES SPECS
          cp -r Linuwu-Sense SOURCES/
          cp -r evdi SOURCES/
          cp kernelmodules.spec SPECS/

      - name: Build RPM
        run: |
          cd SPECS
          rpmbuild -ba kernelmodules.spec

      - name: List built RPMs
        run: |
          echo "Built RPMs:"
          find RPMS -name '*.rpm' -type f
          echo "Built SRPMs:"
          find SRPMS -name '*.rpm' -type f

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules-fedora-43
          path: |
            RPMS/**/*.rpm
            SRPMS/*.src.rpm
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            RPMS/**/*.rpm
            SRPMS/*.src.rpm
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
